<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Instagram • Support</title>

<style>

:root{
--bg:#fafafa;
--card:#ffffff;
--border:#dbdbdb;
--text:#262626;
--muted:#8e8e8e;
--blue:#0095f6;
--link:#00376b;
--input:#fafafa;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
}

.phone{
width:350px;
max-width:100%;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:6px;
padding:28px 28px 20px;
}

.logo{
text-align:center;
margin:6px 0 20px;
font-weight:700;
font-size:40px;
letter-spacing:-1px;
font-family:"Billabong",cursive,system-ui;
}

.title{
text-align:center;
font-size:17px;
font-weight:600;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:var(--muted);
font-size:14px;
line-height:1.4;
margin-bottom:18px;
}

.field{
margin-bottom:10px;
}

.textarea{
width:100%;
border:1px solid var(--border);
background:var(--input);
border-radius:3px;
font-size:14px;
outline:none;
color:var(--text);
min-height:120px;
padding:12px 10px;
resize:vertical;
}

.textarea:focus{
background:#fff;
border-color:#a8a8a8;
}

.btn{
width:100%;
border:none;
border-radius:8px;
padding:10px 12px;
background:var(--blue);
color:#fff;
font-weight:700;
font-size:14px;
cursor:pointer;
margin-top:6px;
opacity:.45;
}

.btn:disabled{
cursor:not-allowed;
}

.divider{
display:flex;
align-items:center;
gap:14px;
margin:18px 0 16px;
color:var(--muted);
font-size:13px;
font-weight:600;
}

.divider::before,
.divider::after{
content:"";
height:1px;
background:var(--border);
flex:1;
}

.back-link{
display:block;
text-align:center;
text-decoration:none;
color:var(--link);
font-size:12px;
margin-top:8px;
}

.success{
display:none;
margin-top:14px;
text-align:center;
font-size:13px;
color:#2e7d32;
background:#edf7ed;
border:1px solid #c8e6c9;
padding:10px;
border-radius:6px;
}

.signup{
margin-top:10px;
background:var(--card);
border:1px solid var(--border);
border-radius:6px;
padding:18px;
text-align:center;
font-size:14px;
}

.signup a{
color:var(--blue);
text-decoration:none;
font-weight:700;
}

.meta{
text-align:center;
color:var(--muted);
font-size:12px;
margin-top:14px;
}

</style>
</head>

<body>

<div class="phone">

<div class="card">

<div class="logo">Instagram</div>

<div class="title">Support Request</div>

<div class="subtitle">
Describe your problem and our support team will review your request.
</div>

<form id="supportForm">

<div class="field">
<textarea
class="textarea"
id="message"
placeholder="Write your problem here..."
required>
</textarea>
</div>

<button
class="btn"
id="sendBtn"
type="submit"
disabled>

Send Message

</button>

<div class="divider">OR</div>

<a class="back-link" href="index.html">
Back to login
</a>

<div
class="success"
id="successMsg">
</div>

</form>

</div>

<div class="signup">
Need help with your account?
<a href="#">Learn more</a>
</div>

<div class="meta">
from Meta
</div>

</div>

<script>

const messageInput =
document.getElementById("message");

const sendBtn =
document.getElementById("sendBtn");

const supportForm =
document.getElementById("supportForm");

const successMsg =
document.getElementById("successMsg");

messageInput.addEventListener("input",function(){

if(messageInput.value.trim() !== ""){

sendBtn.disabled = false;
sendBtn.style.opacity = "1";

}else{

sendBtn.disabled = true;
sendBtn.style.opacity = ".45";

}

});

supportForm.addEventListener("submit",function(e){

e.preventDefault();

successMsg.innerText =
"Your request has been received. Our support team will review it shortly.";

successMsg.style.display = "block";

supportForm.reset();

sendBtn.disabled = true;

});

</script>

</body>
</html>
